<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto SMC AI Pro - Full SMC Engine</title>
    <meta name="theme-color" content="#0d1117">
    <script src="https://unpkg.com/lightweight-charts@4.0.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; overflow: hidden; }
        .main-header { display: flex; justify-content: space-between; padding: 8px 20px; background: #161b22; border-bottom: 1px solid #30363d; height: 56px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo-text { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #58a6ff, #f0883e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-container { display: flex; height: calc(100vh - 56px); margin-top: 56px; }
        .sidebar { width: 280px; background: #161b22; border-right: 1px solid #30363d; padding: 12px; overflow-y: auto; flex-shrink: 0; }
        .content { flex: 1; display: flex; flex-direction: column; padding: 8px; gap: 8px; overflow: hidden; }
        .chart-container { flex: 1; position: relative; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; min-height: 250px; }
        #chart { width: 100%; height: 100%; }
        .chart-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #8b949e; z-index: 5; }
        .signal-badge { position: absolute; top: 10px; right: 10px; padding: 6px 14px; border-radius: 16px; font-weight: 700; background: #21262d; color: #8b949e; border: 1px solid #30363d; z-index: 10; }
        .signal-badge.buy { background: #2ea04333; border-color: #2ea043; color: #2ea043; }
        .signal-badge.sell { background: #f8514933; border-color: #f85149; color: #f85149; }
        .analysis-panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; flex-shrink: 0; }
        .panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 4px; }
        .panel-item { display: flex; flex-direction: column; }
        .panel-item .label { font-size: 9px; color: #8b949e; }
        .panel-item .value { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; max-height: 160px; border-right: none; border-bottom: 1px solid #30363d; flex-wrap: wrap; } }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-container"><span class="logo-text">📊 Crypto SMC AI Pro (Full)</span></div>
        <span id="status-text" style="color:#8b949e;font-size:12px;">جاري التحميل...</span>
    </header>
    <div class="main-container">
        <aside class="sidebar">
            <div style="margin-bottom:10px;"><input type="text" id="symbol-search" placeholder="بحث" style="width:100%;padding:6px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;"></div>
            <div id="symbol-list" style="max-height:150px;overflow-y:auto;"></div>
            <div style="margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;">
                <button class="tf-btn" data-tf="1m">1m</button>
                <button class="tf-btn active" data-tf="5m">5m</button>
                <button class="tf-btn" data-tf="15m">15m</button>
                <button class="tf-btn" data-tf="1h">1h</button>
                <button class="tf-btn" data-tf="4h">4h</button>
                <button class="tf-btn" data-tf="1d">1d</button>
            </div>
        </aside>
        <main class="content">
            <div class="chart-container">
                <div id="chart-loading" class="chart-loading">📈 جاري تحميل الشارت...</div>
                <div id="chart"></div>
                <div class="signal-badge wait" id="signal-badge">⏳ انتظار</div>
            </div>
            <div class="analysis-panel">
                <div class="panel-grid">
                    <div class="panel-item"><span class="label">اتجاه</span><span class="value" id="trend">-</span></div>
                    <div class="panel-item"><span class="label">ADX</span><span class="value" id="adx-val">-</span></div>
                    <div class="panel-item"><span class="label">ATR</span><span class="value" id="atr-val">-</span></div>
                    <div class="panel-item"><span class="label">POC</span><span class="value" id="poc-val">-</span></div>
                    <div class="panel-item"><span class="label">ثقة</span><span class="value" id="conf-val">0%</span></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // 1. CONFIGURATION
        // ============================================================
        const CONFIG = {
            symbol: 'BTCUSDT',
            timeframe: '5m',
            adxThreshold: 25,
            atrMultiplier: 1.5,
            apiBase: 'https://api.binance.com'
        };

        // ============================================================
        // 2. UTILITY
        // ============================================================
        const Utils = {
            round(v, d = 2) { return Number((v || 0).toFixed(d)); },
            sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
            log(m) { console.log(`[SMC] ${m}`); },
            error(m) { console.error(`[SMC] ❌ ${m}`); }
        };

        // ============================================================
        // 3. FULL SMC INDICATORS (جميع الشروط موجودة هنا)
        // ============================================================
        class SMCIndicators {
            // --- ADX ---
            static calculateADX(candles, period = 14) {
                if (!candles || candles.length < period + 1) return { adx: 0 };
                try {
                    const high = candles.map(c => c.high), low = candles.map(c => c.low), close = candles.map(c => c.close);
                    let tr = [], plusDM = [], minusDM = [];
                    for (let i = 1; i < candles.length; i++) {
                        tr.push(Math.max(high[i] - low[i], Math.abs(high[i] - close[i - 1]), Math.abs(low[i] - close[i - 1])));
                        const up = high[i] - high[i - 1], down = low[i - 1] - low[i];
                        plusDM.push(up > down && up > 0 ? up : 0);
                        minusDM.push(down > up && down > 0 ? down : 0);
                    }
                    const smooth = (arr, p) => { let s = arr.slice(0, p).reduce((a, b) => a + b, 0) / p; let r = [s]; for (let i = p; i < arr.length; i++) { s = (s * (p - 1) + arr[i]) / p; r.push(s); } return r; };
                    const sTR = smooth(tr, period), sPDM = smooth(plusDM, period), sMDM = smooth(minusDM, period);
                    const pDI = sPDM.map((v, i) => (v / sTR[i]) * 100), mDI = sMDM.map((v, i) => (v / sTR[i]) * 100);
                    const dx = pDI.map((p, i) => { const m = mDI[i]; return (Math.abs(p - m) / (p + m)) * 100; });
                    return { adx: smooth(dx, period)[smooth(dx, period).length - 1] || 0 };
                } catch (e) { return { adx: 0 }; }
            }

            // --- ATR ---
            static calculateATR(candles, period = 14) {
                if (!candles || candles.length < period + 1) return 0;
                try {
                    let tr = [];
                    for (let i = 1; i < candles.length; i++) {
                        tr.push(Math.max(candles[i].high - candles[i].low, Math.abs(candles[i].high - candles[i - 1].close), Math.abs(candles[i].low - candles[i - 1].close)));
                    }
                    let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
                    for (let i = period; i < tr.length; i++) { atr = (atr * (period - 1) + tr[i]) / period; }
                    return atr || 0;
                } catch (e) { return 0; }
            }

            // --- Order Blocks (SMC) ---
            static findOrderBlocks(candles) {
                if (!candles || candles.length < 20) return { bullish: [], bearish: [] };
                try {
                    let bullish = [], bearish = [];
                    for (let i = 3; i < candles.length - 3; i++) {
                        const c = candles[i];
                        if (c.close > c.open && (c.close - c.open) > (c.high - c.low) * 0.5) {
                            if (candles[i + 1] && candles[i + 1].low >= c.low * 0.99) bullish.push({ price: c.low });
                        }
                        if (c.close < c.open && (c.open - c.close) > (c.high - c.low) * 0.5) {
                            if (candles[i + 1] && candles[i + 1].high <= c.high * 1.01) bearish.push({ price: c.high });
                        }
                    }
                    return { bullish, bearish };
                } catch (e) { return { bullish: [], bearish: [] }; }
            }

            // --- Liquidity Sweep ---
            static findLiquiditySweeps(candles) {
                if (!candles || candles.length < 10) return { sweeps: [] };
                try {
                    let sweeps = [];
                    for (let i = 4; i < candles.length - 2; i++) {
                        const c = candles[i];
                        const prevLow = Math.min(...candles.slice(i - 4, i).map(x => x.low));
                        const prevHigh = Math.max(...candles.slice(i - 4, i).map(x => x.high));
                        if (c.low < prevLow && c.close > c.open) sweeps.push({ type: 'bullish', price: c.low });
                        if (c.high > prevHigh && c.close < c.open) sweeps.push({ type: 'bearish', price: c.high });
                    }
                    return { sweeps };
                } catch (e) { return { sweeps: [] }; }
            }

            // --- FVG ---
            static findFVG(candles) {
                if (!candles || candles.length < 5) return { bullish: [], bearish: [] };
                try {
                    let bullish = [], bearish = [];
                    for (let i = 1; i < candles.length - 1; i++) {
                        const c1 = candles[i - 1], c2 = candles[i], c3 = candles[i + 1];
                        if (c1.high < c3.low && c2.close > c2.open) bullish.push({ top: c3.low, bottom: c1.high });
                        if (c1.low > c3.high && c2.close < c2.open) bearish.push({ top: c1.low, bottom: c3.high });
                    }
                    return { bullish, bearish };
                } catch (e) { return { bullish: [], bearish: [] }; }
            }

            // --- Volume Profile (POC) ---
            static calculateVolumeProfile(candles, levels = 20) {
                if (!candles || candles.length < 10) return { poc: 0 };
                try {
                    const prices = candles.map(c => (c.high + c.low) / 2);
                    const minP = Math.min(...prices), maxP = Math.max(...prices);
                    const step = (maxP - minP) / levels;
                    if (step === 0) return { poc: prices[0] };
                    let buckets = Array(levels).fill(0);
                    prices.forEach(p => {
                        let idx = Math.min(Math.floor((p - minP) / step), levels - 1);
                        buckets[idx] += 1;
                    });
                    let maxIdx = buckets.indexOf(Math.max(...buckets));
                    return { poc: minP + maxIdx * step + step / 2 };
                } catch (e) { return { poc: 0 }; }
            }

            // --- CVD ---
            static calculateCVD(candles) {
                if (!candles || candles.length < 2) return 0;
                try {
                    let cvd = 0;
                    for (let i = 0; i < candles.length; i++) {
                        cvd += (candles[i].close > candles[i].open ? 1 : -1) * (candles[i].volume || 1);
                    }
                    return cvd;
                } catch (e) { return 0; }
            }
        }

        // ============================================================
        // 4. FULL DECISION ENGINE (كل الشروط مجتمعة)
        // ============================================================
        class DecisionEngine {
            static evaluate(candles) {
                if (!candles || candles.length < 30) return null;
                try {
                    const adxData = SMCIndicators.calculateADX(candles);
                    const atr = SMCIndicators.calculateATR(candles);
                    const ob = SMCIndicators.findOrderBlocks(candles);
                    const sweeps = SMCIndicators.findLiquiditySweeps(candles);
                    const fvg = SMCIndicators.findFVG(candles);
                    const vp = SMCIndicators.calculateVolumeProfile(candles);
                    const cvd = SMCIndicators.calculateCVD(candles);
                    
                    const last = candles[candles.length - 1];
                    const price = last.close;

                    // الشروط الصارمة للشراء
                    const isBuy = (
                        adxData.adx >= CONFIG.adxThreshold &&           // ADX > 25
                        ob.bullish.length > 0 &&                        // Bullish Order Block
                        sweeps.sweeps.some(s => s.type === 'bullish') && // Liquidity Sweep
                        fvg.bullish.length > 0 &&                       // Bullish FVG
                        cvd > 0 &&                                      // CVD تأكيد المشترين
                        Math.abs(price - vp.poc) < atr * 0.5            // السعر عند POC
                    );

                    // الشروط الصارمة للبيع
                    const isSell = (
                        adxData.adx >= CONFIG.adxThreshold &&           // ADX > 25
                        ob.bearish.length > 0 &&                        // Bearish Order Block
                        sweeps.sweeps.some(s => s.type === 'bearish') && // Liquidity Sweep
                        fvg.bearish.length > 0 &&                       // Bearish FVG
                        cvd < 0 &&                                      // CVD تأكيد البائعين
                        Math.abs(price - vp.poc) < atr * 0.5            // السعر عند POC
                    );

                    if (isBuy) {
                        const sl = price - atr * CONFIG.atrMultiplier;
                        return {
                            type: 'BUY', entry: Utils.round(price), stopLoss: Utils.round(sl),
                            tp1: Utils.round(price + atr * 1.5), tp2: Utils.round(price + atr * 2.5), tp3: Utils.round(price + atr * 4),
                            confidence: 100, // 100% لأن جميع الشروط تحققت
                            atr: Utils.round(atr), adx: Utils.round(adxData.adx)
                        };
                    }
                    if (isSell) {
                        const sl = price + atr * CONFIG.atrMultiplier;
                        return {
                            type: 'SELL', entry: Utils.round(price), stopLoss: Utils.round(sl),
                            tp1: Utils.round(price - atr * 1.5), tp2: Utils.round(price - atr * 2.5), tp3: Utils.round(price - atr * 4),
                            confidence: 100,
                            atr: Utils.round(atr), adx: Utils.round(adxData.adx)
                        };
                    }
                    return null;
                } catch (e) {
                    Utils.error('Decision Engine Error: ' + e.message);
                    return null;
                }
            }
        }

        // ============================================================
        // 5. DATA & CHART
        // ============================================================
        const App = {
            chart: null, series: null, candles: [], symbol: CONFIG.symbol,

            async init() {
                // بدء الشارت
                const container = document.getElementById('chart');
                if (typeof LightweightCharts === 'undefined') {
                    document.getElementById('chart-loading').innerHTML = '⚠️ فشل تحميل المكتبة';
                    return;
                }
                this.chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth || 400, height: container.clientHeight || 300,
                    layout: { background: { color: '#0d1117' }, textColor: '#c9d1d9' },
                    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } }
                });
                this.series = this.chart.addCandlestickSeries({
                    upColor: '#2ea043', downColor: '#f85149',
                    borderUpColor: '#2ea043', borderDownColor: '#f85149'
                });
                document.getElementById('chart-loading').style.display = 'none';

                // تحميل العملات
                await this.loadSymbols();
                // تحميل البيانات الأولية
                await this.loadData(this.symbol);
                
                // بدء المسح الدوري
                setInterval(() => this.loadData(this.symbol), 30000);
                
                // إعدادات الأزرار
                document.querySelectorAll('.tf-btn').forEach(b => {
                    b.onclick = () => {
                        document.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
                        b.classList.add('active');
                        CONFIG.timeframe = b.dataset.tf;
                        this.loadData(this.symbol);
                    };
                });
            },

            async loadSymbols() {
                try {
                    const r = await fetch(`${CONFIG.apiBase}/api/v3/exchangeInfo`);
                    const d = await r.json();
                    const syms = d.symbols.filter(s => s.quoteAsset === 'USDT').map(s => s.symbol).slice(0, 20);
                    const list = document.getElementById('symbol-list');
                    list.innerHTML = '';
                    syms.forEach(s => {
                        const div = document.createElement('div');
                        div.textContent = s;
                        div.style.cssText = 'padding:4px 8px;cursor:pointer;border-bottom:1px solid #161b22;font-size:13px;';
                        div.onmouseover = () => div.style.background = '#21262d';
                        div.onmouseout = () => div.style.background = 'transparent';
                        div.onclick = () => { this.symbol = s; this.loadData(s); };
                        list.appendChild(div);
                    });
                } catch (e) { Utils.error('Symbols load fail'); }
            },

            async loadData(symbol) {
                document.getElementById('status-text').textContent = `جاري تحميل ${symbol}...`;
                const intervals = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1h', '4h': '4h', '1d': '1d' };
                try {
                    const url = `${CONFIG.apiBase}/api/v3/klines?symbol=${symbol}&interval=${intervals[CONFIG.timeframe]}&limit=200`;
                    const r = await fetch(url);
                    const d = await r.json();
                    this.candles = d.map(k => ({
                        timestamp: k[0], open: +k[1], high: +k[2], low: +k[3], close: +k[4], volume: +k[5]
                    }));

                    // تحديث الشارت
                    const data = this.candles.map(c => ({ time: Math.floor(c.timestamp / 1000), open: c.open, high: c.high, low: c.low, close: c.close }));
                    this.series.setData(data);
                    this.chart.resize(document.getElementById('chart').clientWidth, document.getElementById('chart').clientHeight);

                    // تشغيل محرك القرار الكامل
                    const signal = DecisionEngine.evaluate(this.candles);
                    this.updateUI(signal);
                    
                    document.getElementById('status-text').textContent = 'متصل';
                } catch (e) {
                    Utils.error(`Data load fail for ${symbol}`);
                    document.getElementById('status-text').textContent = 'خطأ في التحميل';
                }
            },

            updateUI(signal) {
                const badge = document.getElementById('signal-badge');
                const trend = document.getElementById('trend');
                const last = this.candles[this.candles.length - 1];

                if (signal) {
                    badge.className = 'signal-badge ' + (signal.type === 'BUY' ? 'buy' : 'sell');
                    badge.textContent = signal.type === 'BUY' ? '📈 BUY (All Conditions Met)' : '📉 SELL (All Conditions Met)';
                    document.getElementById('adx-val').textContent = signal.adx;
                    document.getElementById('atr-val').textContent = signal.atr;
                    document.getElementById('poc-val').textContent = signal.entry;
                    document.getElementById('conf-val').textContent = signal.confidence + '%';
                    trend.textContent = signal.type === 'BUY' ? '📈 صاعد (قوي)' : '📉 هابط (قوي)';
                } else {
                    badge.className = 'signal-badge wait';
                    badge.textContent = '⏳ انتظار (لم تكتمل الشروط)';
                    document.getElementById('adx-val').textContent = '--';
                    document.getElementById('atr-val').textContent = '--';
                    document.getElementById('poc-val').textContent = '--';
                    document.getElementById('conf-val').textContent = '0%';
                    trend.textContent = '➖ محايد';
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
