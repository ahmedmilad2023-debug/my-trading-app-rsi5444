<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>إشارات سكالبينغ - 10 عملات</title>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e17;
      font-family: 'Tajawal', 'Segoe UI', sans-serif;
      color: #e0e0e0;
      padding: 10px;
    }
    .app { max-width: 950px; margin: 0 auto; }
    header { text-align: center; padding: 10px 0 20px; }
    header h1 { color: #f7931a; font-size: 1.8rem; letter-spacing: 1px; }
    .status-msg { text-align: center; color: #ff9800; margin: 5px 0; font-size: 0.9rem; }
    .coin-selector {
      display: flex; justify-content: center; margin: 15px 0; gap: 10px; flex-wrap: wrap;
      background: #111620; padding: 10px; border-radius: 8px; border: 1px solid #1f2a3a;
    }
    .coin-selector select {
      padding: 8px 12px; border-radius: 6px; background: #1f2a3a; color: #fff; border: 1px solid #2a3a4e;
      font-size: 1rem;
    }
    .coin-selector button {
      background: #f7931a; color: #000; font-weight: bold; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;
    }
    #chart-container {
      width: 100%; height: 450px; border-radius: 12px; overflow: hidden;
      background: #111620; border: 1px solid #1f2a3a; margin-top: 10px;
    }
    .signals-section { margin-top: 20px; }
    .section-title {
      font-size: 1.3rem; font-weight: bold; border-bottom: 2px solid #f7931a;
      padding-bottom: 6px; margin-bottom: 12px;
    }
    .signal-card {
      background: #131a25; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 12px; border: 1px solid #1f2a3a; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .signal-type { font-weight: bold; font-size: 1.1rem; padding: 4px 12px; border-radius: 20px; }
    .long { color: #4caf50; background: rgba(76,175,80,0.15); }
    .short { color: #f44336; background: rgba(244,67,54,0.15); }
    .signal-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; font-size: 0.9rem; margin-bottom: 12px; }
    .detail-item span:first-child { color: #9aa0b0; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      background: #1f2a3a; border: none; color: #e0e0e0; padding: 8px 14px;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn:hover { background: #2a3a4e; }
    .btn.share { background: #253349; }
    .btn.analysis { background: #2e3a4a; }
    .archive { margin-top: 30px; }
    .archive-table {
      width: 100%; border-collapse: collapse; background: #111620;
      border-radius: 10px; overflow: hidden; font-size: 0.85rem;
    }
    .archive-table th, .archive-table td { padding: 10px; text-align: center; border-bottom: 1px solid #1f2a3a; }
    .archive-table th { background: #1b2432; color: #f7931a; font-weight: bold; }
    .notification-btn { background: #f7931a; color: #000; font-weight: bold; margin-bottom: 15px; }
    .modal {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content {
      background: #131a25; padding: 20px; border-radius: 12px;
      max-width: 400px; width: 90%; text-align: center; border: 1px solid #2a3a4e;
    }
    .modal-content p { margin: 10px 0; }
    .close-modal { background: #f44336; color: white; margin-top: 10px; }
    @media (max-width: 600px) {
      #chart-container { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>⚡ إشارات بولنجر باند × فيبوناتشي</h1>
      <button class="btn notification-btn" onclick="requestNotificationPermission()">🔔 تفعيل التنبيهات</button>
      <div id="status-message" class="status-msg">اختر عملة من القائمة</div>
    </header>

    <div class="coin-selector">
      <select id="coin-select">
        <option value="BTCUSDT">BTCUSDT</option>
        <option value="ETHUSDT">ETHUSDT</option>
        <option value="SOLUSDT">SOLUSDT</option>
        <option value="DOGEUSDT">DOGEUSDT</option>
        <option value="ADAUSDT">ADAUSDT</option>
        <option value="XRPUSDT">XRPUSDT</option>
        <option value="DOTUSDT">DOTUSDT</option>
        <option value="BNBUSDT">BNBUSDT</option>
        <option value="AVAXUSDT">AVAXUSDT</option>
        <option value="LINKUSDT">LINKUSDT</option>
      </select>
      <button onclick="switchCoin()">تحميل</button>
    </div>

    <div id="chart-container"></div>

    <div class="signals-section">
      <div class="section-title">📊 الإشارات المفتوحة (<span id="current-coin-label">BTCUSDT</span>)</div>
      <div id="open-signals">لا توجد إشارات</div>
    </div>

    <div class="archive">
      <div class="section-title">📁 أرشيف الصفقات المغلقة</div>
      <table class="archive-table" id="archive-table">
        <thead><tr><th>العملة</th><th>التاريخ</th><th>نوع</th><th>دخول</th><th>خروج</th><th>ربح/خسارة %</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="analysis-modal" class="modal">
    <div class="modal-content">
      <h3>تحليل الإشارة</h3>
      <p id="analysis-text"></p>
      <button class="btn close-modal" onclick="closeModal()">إغلاق</button>
    </div>
  </div>

  <script>
    // ---------- القائمة ----------
    const COINS = [
      'BTCUSDT','ETHUSDT','SOLUSDT','DOGEUSDT','ADAUSDT',
      'XRPUSDT','DOTUSDT','BNBUSDT','AVAXUSDT','LINKUSDT'
    ];
    const BB_PERIOD = 20, BB_STD = 2, RSI_PERIOD = 14, LIMIT = 100;

    let currentSymbol = 'BTCUSDT';
    let chart, candleSeries, bbUpperLine, bbLowerLine;
    let allCandles = [];
    let currentSignals = []; // للإشارات المفتوحة للعملة الحالية
    let closedSignals = JSON.parse(localStorage.getItem('closedSignalsAll') || '[]');
    let ws = null;

    // تحديث نص الحالة
    function setStatus(msg, isError = false) {
      const el = document.getElementById('status-message');
      if (el) {
        el.textContent = msg;
        el.style.color = isError ? '#f44336' : '#ff9800';
      }
    }

    // ---------- الرسم البياني ----------
    function initChart() {
      if (chart) {
        chart.remove();
        chart = null;
      }
      document.getElementById('chart-container').innerHTML = '';
      chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { background: { type: 'solid', color: '#111620' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2a3a' }, horzLines: { color: '#1f2a3a' } },
        crosshair: { mode: 0 },
        rightPriceScale: { borderColor: '#2a3a4e' },
        timeScale: { borderColor: '#2a3a4e', timeVisible: true, secondsVisible: false },
        localization: { locale: 'ar-EG' },
      });
      candleSeries = chart.addCandlestickSeries({
        upColor: '#4caf50', downColor: '#f44336',
        borderUpColor: '#4caf50', borderDownColor: '#f44336',
        wickUpColor: '#4caf50', wickDownColor: '#f44336',
      });
      bbUpperLine = chart.addLineSeries({ color: '#ff9800', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
      bbLowerLine = chart.addLineSeries({ color: '#ff9800', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    }

    async function fetchHistoricalData(symbol) {
      try {
        const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=${LIMIT}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('فشل الاتصال');
        const data = await res.json();
        return data.map(d => ({
          time: Math.floor(d[0] / 1000),
          open: parseFloat(d[1]),
          high: parseFloat(d[2]),
          low: parseFloat(d[3]),
          close: parseFloat(d[4]),
        }));
      } catch (e) {
        console.error(e);
        setStatus('❌ فشل جلب البيانات من Binance.', true);
        return [];
      }
    }

    // ---------- المؤشرات ----------
    function calculateBBands(candles) {
      const closes = candles.map(c => c.close);
      let upper = [], lower = [];
      for (let i = BB_PERIOD - 1; i < candles.length; i++) {
        const slice = closes.slice(i - BB_PERIOD + 1, i + 1);
        const mean = slice.reduce((a, b) => a + b, 0) / BB_PERIOD;
        const variance = slice.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / BB_PERIOD;
        const sd = Math.sqrt(variance);
        upper.push({ time: candles[i].time, value: mean + BB_STD * sd });
        lower.push({ time: candles[i].time, value: mean - BB_STD * sd });
      }
      return { upper, lower };
    }

    function calculateRSI(candles) {
      let gains = [], losses = [], rsiData = [];
      for (let i = 1; i < candles.length; i++) {
        const diff = candles[i].close - candles[i-1].close;
        gains.push(diff > 0 ? diff : 0);
        losses.push(diff < 0 ? -diff : 0);
      }
      let avgGain = gains.slice(0, RSI_PERIOD).reduce((a,b)=>a+b,0)/RSI_PERIOD;
      let avgLoss = losses.slice(0, RSI_PERIOD).reduce((a,b)=>a+b,0)/RSI_PERIOD;
      for (let i = RSI_PERIOD; i < candles.length; i++) {
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        const rsi = 100 - (100 / (1 + rs));
        rsiData.push({ time: candles[i].time, value: rsi });
        avgGain = ((avgGain * (RSI_PERIOD - 1)) + gains[i]) / RSI_PERIOD;
        avgLoss = ((avgLoss * (RSI_PERIOD - 1)) + losses[i]) / RSI_PERIOD;
      }
      return rsiData;
    }

    function findFibLevels(candles) {
      const high = Math.max(...candles.map(c => c.high));
      const low = Math.min(...candles.map(c => c.low));
      return {
        high, low,
        fib618: high - (high - low) * 0.618,
      };
    }

    function checkForSignals(candles, rsiData, bbUpper, bbLower, symbol) {
      if (candles.length < BB_PERIOD + 5) return;
      const last = candles[candles.length - 1];
      const prev = candles[candles.length - 2];
      const lastRSI = rsiData[rsiData.length-1]?.value ?? 50;
      const prevRSI = rsiData[rsiData.length-2]?.value ?? 50;
      const lastBBUpper = bbUpper[bbUpper.length-1]?.value;
      const lastBBLower = bbLower[bbLower.length-1]?.value;
      const prevBBUpper = bbUpper[bbUpper.length-2]?.value;
      const prevBBLower = bbLower[bbLower.length-2]?.value;

      if (!lastBBLower || !prevBBLower || !lastBBUpper || !prevBBUpper) return;

      if (prev.close < prevBBLower && prevRSI < 30 && last.close > lastBBLower && last.close > prev.close) {
        const fib = findFibLevels(candles.slice(-30));
        const entry = last.close;
        const stop = Math.min(prev.low, last.low) * 0.998;
        const target = fib.fib618;
        if (target > entry && stop < entry && !signalExists('شراء', entry, symbol)) {
          createSignal('شراء', entry, stop, target, 'ارتداد من الحد السفلي مع تشبع بيع RSI', symbol);
        }
      }
      if (prev.close > prevBBUpper && prevRSI > 70 && last.close < lastBBUpper && last.close < prev.close) {
        const fib = findFibLevels(candles.slice(-30));
        const entry = last.close;
        const stop = Math.max(prev.high, last.high) * 1.002;
        const target = fib.fib618;
        if (target < entry && stop > entry && !signalExists('بيع', entry, symbol)) {
          createSignal('بيع', entry, stop, target, 'ارتداد من الحد العلوي مع تشبع شراء RSI', symbol);
        }
      }
    }

    function signalExists(type, entry, symbol) {
      return currentSignals.some(s => s.type === type && s.symbol === symbol && Math.abs(s.entry - entry)/entry < 0.002);
    }

    function createSignal(type, entry, stopLoss, target, analysis, symbol) {
      const now = new Date();
      const signal = {
        id: Date.now() + Math.random(),
        type,
        symbol,
        entry: entry.toFixed(2),
        stopLoss: stopLoss.toFixed(2),
        target: target.toFixed(2),
        time: now.toLocaleString('ar-SA'),
        analysis,
        status: 'مفتوح'
      };
      currentSignals.push(signal);
      renderSignals();
      sendNotification(`إشارة ${type} - ${symbol}`, `دخول: ${entry} | هدف: ${target} | وقف: ${stopLoss}`);
    }

    function closeSignal(id, exitPrice, reason) {
      const signal = currentSignals.find(s => s.id == id);
      if (!signal) return;
      const entry = parseFloat(signal.entry);
      const exit = parseFloat(exitPrice);
      const pnl = signal.type === 'شراء' ? ((exit-entry)/entry*100) : ((entry-exit)/entry*100);
      const closed = {
        ...signal,
        exitPrice: exit.toFixed(2),
        pnl: pnl.toFixed(2) + '%',
        closeTime: new Date().toLocaleString('ar-SA'),
        reason
      };
      closedSignals.push(closed);
      localStorage.setItem('closedSignalsAll', JSON.stringify(closedSignals));
      currentSignals = currentSignals.filter(s => s.id != id);
      renderSignals();
      renderArchive();
      sendNotification('صفقة مغلقة', `${signal.symbol} - ${signal.type} | ${closed.pnl}`);
    }

    // ---------- واجهة المستخدم ----------
    function renderSignals() {
      const container = document.getElementById('open-signals');
      const filtered = currentSignals.filter(s => s.symbol === currentSymbol);
      if (filtered.length === 0) {
        container.innerHTML = '<p style="color:#9aa0b0; text-align:center;">لا توجد إشارات مفتوحة حالياً</p>';
        return;
      }
      container.innerHTML = filtered.map(s => `
        <div class="signal-card">
          <div class="signal-header">
            <span class="signal-type ${s.type==='شراء'?'long':'short'}">${s.type}</span>
            <span>${s.time}</span>
          </div>
          <div class="signal-details">
            <div class="detail-item"><span>الدخول:</span> ${s.entry}</div>
            <div class="detail-item"><span>الهدف:</span> ${s.target}</div>
            <div class="detail-item"><span>الوقف:</span> ${s.stopLoss}</div>
          </div>
          <div class="actions">
            <button class="btn share" onclick="shareSignal('${s.symbol} ${s.type} دخول ${s.entry} هدف ${s.target} وقف ${s.stopLoss}')">📤 مشاركة</button>
            <button class="btn analysis" onclick="showAnalysis(\`${s.analysis}\`)">🔍 تحليل</button>
            <button class="btn" onclick="closeSignal(${s.id}, ${s.type==='شراء'?s.entry:s.entry}, 'يدوي')">✖ إغلاق يدوي</button>
          </div>
        </div>
      `).join('');
    }

    function renderArchive() {
      const tbody = document.querySelector('#archive-table tbody');
      tbody.innerHTML = closedSignals.slice(-30).reverse().map(s => `
        <tr>
          <td>${s.symbol}</td>
          <td>${s.closeTime}</td>
          <td class="${s.type==='شراء'?'long':'short'}">${s.type}</td>
          <td>${s.entry}</td>
          <td>${s.exitPrice}</td>
          <td style="color:${s.pnl.includes('-')?'#f44336':'#4caf50'}">${s.pnl}</td>
        </tr>
      `).join('');
    }

    function shareSignal(text) {
      navigator.clipboard.writeText(text).then(() => alert('تم نسخ النص'));
    }
    function showAnalysis(text) {
      document.getElementById('analysis-text').innerText = text;
      document.getElementById('analysis-modal').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('analysis-modal').style.display = 'none';
    }
    function requestNotificationPermission() {
      if (!("Notification" in window)) return alert("لا يدعم المتصفح");
      Notification.requestPermission().then(p => {
        alert(p === "granted" ? "تم التفعيل" : "تم الرفض");
      });
    }
    function sendNotification(title, body) {
      if (Notification.permission === "granted") {
        new Notification(title, { body });
      }
    }

    // ---------- التبديل بين العملات ----------
    async function loadCoin(symbol) {
      if (ws) { ws.close(); ws = null; }
      currentSymbol = symbol;
      document.getElementById('current-coin-label').textContent = symbol;
      setStatus('⏳ جارٍ تحميل ' + symbol + '...');
      const candles = await fetchHistoricalData(symbol);
      if (candles.length === 0) {
        setStatus('❌ فشل تحميل ' + symbol, true);
        return;
      }
      allCandles = candles;
      candleSeries.setData(candles);
      const { upper, lower } = calculateBBands(candles);
      const rsiData = calculateRSI(candles);
      bbUpperLine.setData(upper);
      bbLowerLine.setData(lower);
      checkForSignals(candles, rsiData, upper, lower, symbol);
      setStatus('✅ متصل بـ ' + symbol);
      renderSignals();
      startLiveUpdates(symbol);
    }

    function startLiveUpdates(symbol) {
      if (ws) ws.close();
      ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_5m`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        const k = msg.k;
        if (!k.x) return;
        const newCandle = {
          time: Math.floor(k.t / 1000),
          open: parseFloat(k.o),
          high: parseFloat(k.h),
          low: parseFloat(k.l),
          close: parseFloat(k.c),
        };
        const idx = allCandles.findIndex(c => c.time === newCandle.time);
        if (idx !== -1) {
          allCandles[idx] = newCandle;
          candleSeries.update(newCandle);
        } else {
          allCandles.push(newCandle);
          candleSeries.update(newCandle);
        }
        const { upper, lower } = calculateBBands(allCandles);
        const rsiData = calculateRSI(allCandles);
        bbUpperLine.setData(upper);
        bbLowerLine.setData(lower);
        checkForSignals(allCandles, rsiData, upper, lower, symbol);
        currentSignals.forEach(s => {
          if (s.symbol !== symbol) return;
          const target = parseFloat(s.target);
          const stop = parseFloat(s.stopLoss);
          if (s.type === 'شراء') {
            if (newCandle.close >= target) closeSignal(s.id, target, 'هدف');
            else if (newCandle.close <= stop) closeSignal(s.id, stop, 'وقف خسارة');
          } else {
            if (newCandle.close <= target) closeSignal(s.id, target, 'هدف');
            else if (newCandle.close >= stop) closeSignal(s.id, stop, 'وقف خسارة');
          }
        });
      };
      ws.onerror = () => setStatus('⚠️ خطأ WebSocket', true);
    }

    function switchCoin() {
      const select = document.getElementById('coin-select');
      loadCoin(select.value);
    }

    window.onload = () => {
      initChart();
      loadCoin('BTCUSDT');
      renderArchive();
    };
  </script>
</body>
  </html>
