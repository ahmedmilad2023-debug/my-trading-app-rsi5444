<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto SMC AI Pro - محرك إشارات SMC</title>
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="محرك احترافي لإشارات التداول يعتمد على Smart Money Concepts">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        /* ============================================================
           CSS - STYLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #161b22;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #58a6ff;
        }
        
        /* ===== HEADER ===== */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            height: 56px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        
        .version {
            font-size: 10px;
            color: #8b949e;
            background: #21262d;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8b949e;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ea043;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .btn-icon {
            background: #21262d;
            color: #c9d1d9;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            border: 1px solid #30363d;
        }
        
        .btn-icon:hover {
            background: #30363d;
            border-color: #58a6ff;
        }
        
        /* ===== MAIN CONTAINER ===== */
        .main-container {
            display: flex;
            height: calc(100vh - 56px);
            margin-top: 56px;
            gap: 0;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .sidebar-section {
            background: #0d1117;
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid #21262d;
        }
        
        .sidebar-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .symbol-search {
            position: relative;
        }
        
        .symbol-search input {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            transition: border 0.2s;
        }
        
        .symbol-search input:focus {
            border-color: #58a6ff;
        }
        
        .symbol-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 6px;
        }
        
        .symbol-item {
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-bottom: 1px solid #161b22;
        }
        
        .symbol-item:hover {
            background: #21262d;
        }
        
        .symbol-item.active {
            background: #1f6feb22;
            border-left: 2px solid #58a6ff;
        }
        
        .symbol-item .sym {
            color: #c9d1d9;
            font-weight: 600;
        }
        
        .symbol-item .price {
            color: #8b949e;
        }
        
        .symbol-item .signal-badge-mini {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            background: #21262d;
        }
        
        .symbol-item .signal-badge-mini.buy {
            background: #2ea04333;
            color: #2ea043;
            border: 1px solid #2ea04344;
        }
        
        .symbol-item .signal-badge-mini.sell {
            background: #f8514933;
            color: #f85149;
            border: 1px solid #f8514944;
        }
        
        .timeframe-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        
        .tf-btn {
            padding: 4px 0;
            background: #0d1117;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 11px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .tf-btn:hover {
            background: #21262d;
        }
        
        .tf-btn.active {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }
        
        .indicator-toggle {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
        }
        
        .indicator-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #8b949e;
            padding: 2px 0;
        }
        
        .indicator-toggle input[type="checkbox"] {
            accent-color: #58a6ff;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        
        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow: hidden;
            background: #0d1117;
        }
        
        /* ===== CHART ===== */
        .chart-container {
            flex: 1;
            position: relative;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            min-height: 250px;
        }
        
        #chart {
            width: 100%;
            height: 100%;
        }
        
        .chart-overlay {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        
        .signal-badge {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            background: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
            transition: all 0.3s;
            pointer-events: none;
        }
        
        .signal-badge.buy {
            background: #2ea04333;
            border-color: #2ea043;
            color: #2ea043;
            box-shadow: 0 0 20px #2ea04322;
        }
        
        .signal-badge.sell {
            background: #f8514933;
            border-color: #f85149;
            color: #f85149;
            box-shadow: 0 0 20px #f8514922;
        }
        
        .signal-badge.wait {
            background: #21262d;
            border-color: #30363d;
            color: #8b949e;
        }
        
        .signal-price {
            font-size: 11px;
            color: #8b949e;
            background: #161b22cc;
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        
        /* ===== ANALYSIS PANEL ===== */
        .analysis-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 12px;
            flex-shrink: 0;
            max-height: 110px;
            overflow-y: auto;
        }
        
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 4px 12px;
        }
        
        .panel-item {
            display: flex;
            flex-direction: column;
        }
        
        .panel-item .label {
            font-size: 9px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .panel-item .value {
            font-size: 14px;
            font-weight: 600;
            color: #c9d1d9;
        }
        
        .panel-item .value.confidence {
            color: #f0883e;
        }
        
        .panel-item .value.bullish {
            color: #2ea043;
        }
        
        .panel-item .value.bearish {
            color: #f85149;
        }
        
        .panel-item .value.neutral {
            color: #8b949e;
        }
        
        /* ===== SIGNAL PANEL ===== */
        .signal-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 12px;
            flex-shrink: 0;
            max-height: 160px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        
        .signal-header h3 {
            font-size: 13px;
            color: #c9d1d9;
            font-weight: 600;
        }
        
        .signal-header #signal-time {
            font-size: 11px;
            color: #8b949e;
        }
        
        .signal-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .signal-empty {
            color: #8b949e;
            font-size: 12px;
            text-align: center;
            padding: 20px 0;
        }
        
        .signal-item {
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 6px;
            border-left: 3px solid;
            background: #0d1117;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .signal-item.buy {
            border-color: #2ea043;
        }
        
        .signal-item.sell {
            border-color: #f85149;
        }
        
        .signal-item .signal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .signal-item .signal-type {
            font-weight: 700;
            font-size: 13px;
        }
        
        .signal-item .signal-type.buy {
            color: #2ea043;
        }
        
        .signal-item .signal-type.sell {
            color: #f85149;
        }
        
        .signal-item .signal-conf {
            font-size: 11px;
            color: #f0883e;
        }
        
        .signal-item .signal-details {
            color: #8b949e;
            font-size: 11px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .signal-item .signal-reasons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        
        .signal-item .reason-tag {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            background: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
        }
        
        .signal-item .reason-tag.met {
            background: #2ea04322;
            color: #2ea043;
            border-color: #2ea04344;
        }
        
        .signal-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #21262d;
            flex-shrink: 0;
        }
        
        .btn-primary {
            padding: 5px 14px;
            background: #1f6feb;
            color: #fff;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .btn-primary:hover {
            background: #388bfd;
        }
        
        .btn-secondary {
            padding: 5px 14px;
            background: #21262d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #30363d;
            transition: background 0.2s;
        }
        
        .btn-secondary:hover {
            background: #30363d;
        }
        
        /* ===== HIGH PROBABILITY SIGNALS ===== */
        .hp-signals-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 6px 10px;
            flex-shrink: 0;
            max-height: 130px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .hp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: 4px;
        }
        
        .hp-header h3 {
            font-size: 12px;
            color: #f0883e;
            font-weight: 600;
        }
        
        .hp-header .hp-count {
            font-size: 10px;
            color: #8b949e;
        }
        
        .hp-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .hp-item {
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            background: #0d1117;
            border-left: 2px solid;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .hp-item:hover {
            background: #21262d;
        }
        
        .hp-item.buy {
            border-color: #2ea043;
        }
        
        .hp-item.sell {
            border-color: #f85149;
        }
        
        .hp-item .hp-symbol {
            font-weight: 600;
            color: #c9d1d9;
        }
        
        .hp-item .hp-type {
            font-size: 10px;
            font-weight: 600;
        }
        
        .hp-item .hp-type.buy {
            color: #2ea043;
        }
        
        .hp-item .hp-type.sell {
            color: #f85149;
        }
        
        .hp-item .hp-conf {
            font-size: 10px;
            color: #f0883e;
        }
        
        .hp-empty {
            color: #8b949e;
            font-size: 12px;
            text-align: center;
            padding: 15px 0;
        }
        
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 480px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-header h2 {
            font-size: 18px;
            color: #c9d1d9;
        }
        
        .close-modal {
            background: none;
            color: #8b949e;
            font-size: 22px;
            transition: color 0.2s;
        }
        
        .close-modal:hover {
            color: #f85149;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 3px;
        }
        
        .form-group input {
            width: 100%;
            padding: 6px 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
        }
        
        .form-group input:focus {
            border-color: #58a6ff;
        }
        
        .modal-footer {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
                padding: 8px;
            }
            .panel-grid {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            }
            .logo-text {
                font-size: 14px;
            }
        }
        
        @media (max-width: 600px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 160px;
                border-right: none;
                border-bottom: 1px solid #30363d;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 6px;
                gap: 6px;
            }
            .sidebar-section {
                padding: 6px 8px;
            }
            .symbol-search {
                width: 100%;
            }
            .symbol-list {
                max-height: 60px;
            }
            .content {
                padding: 4px;
            }
            .panel-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .analysis-panel {
                max-height: 80px;
            }
            .signal-panel {
                max-height: 140px;
            }
            .hp-signals-panel {
                max-height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================================
    HTML STRUCTURE
    ============================================================ -->
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="logo-container">
                <span class="logo-text">📊 Crypto SMC AI Pro</span>
                <span class="version">v3.0.0</span>
            </div>
            <div class="header-controls">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="status-text">متصل</span>
                </div>
                <button id="settings-btn" class="btn-icon">⚙️</button>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">🔍 البحث عن عملة</div>
                    <div class="symbol-search">
                        <input type="text" id="symbol-search" placeholder="مثال: BTCUSDT">
                        <div id="symbol-list" class="symbol-list"></div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">⏱️ الفريم الزمني</div>
                    <div class="timeframe-selector">
                        <button class="tf-btn active" data-tf="1m">1m</button>
                        <button class="tf-btn" data-tf="5m">5m</button>
                        <button class="tf-btn" data-tf="15m">15m</button>
                        <button class="tf-btn" data-tf="1h">1h</button>
                        <button class="tf-btn" data-tf="4h">4h</button>
                        <button class="tf-btn" data-tf="1d">1d</button>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">📈 المؤشرات</div>
                    <div class="indicator-toggle">
                        <label><input type="checkbox" checked id="show-ob"> Order Blocks</label>
                        <label><input type="checkbox" checked id="show-lq"> Liquidity Zones</label>
                        <label><input type="checkbox" checked id="show-fvg"> FVG</label>
                        <label><input type="checkbox" checked id="show-vp"> Volume Profile</label>
                        <label><input type="checkbox" checked id="show-struct"> Market Structure</label>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content">
                <!-- Chart -->
                <div class="chart-container">
                    <div id="chart"></div>
                    <div class="chart-overlay">
                        <div class="signal-badge wait" id="signal-badge">⏳ انتظار</div>
                        <div class="signal-price" id="signal-price">--</div>
                    </div>
                </div>

                <!-- Analysis Panel -->
                <div class="analysis-panel">
                    <div class="panel-grid">
                        <div class="panel-item"><span class="label">الاتجاه</span><span class="value neutral" id="trend">-</span></div>
                        <div class="panel-item"><span class="label">ADX</span><span class="value" id="adx-value">-</span></div>
                        <div class="panel-item"><span class="label">ATR</span><span class="value" id="atr-value">-</span></div>
                        <div class="panel-item"><span class="label">POC</span><span class="value" id="poc-value">-</span></div>
                        <div class="panel-item"><span class="label">VAH</span><span class="value" id="vah-value">-</span></div>
                        <div class="panel-item"><span class="label">VAL</span><span class="value" id="val-value">-</span></div>
                        <div class="panel-item"><span class="label">CVD</span><span class="value" id="cvd-value">-</span></div>
                        <div class="panel-item"><span class="label">الثقة</span><span class="value confidence" id="confidence">0%</span></div>
                    </div>
                </div>

                <!-- High Probability Signals -->
                <div class="hp-signals-panel">
                    <div class="hp-header">
                        <h3>🔥 High Probability Signals</h3>
                        <span class="hp-count" id="hp-count">0</span>
                    </div>
                    <div class="hp-content" id="hp-content">
                        <div class="hp-empty">⏳ جاري البحث عن فرص...</div>
                    </div>
                </div>

                <!-- Signal Panel -->
                <div class="signal-panel">
                    <div class="signal-header">
                        <h3>📊 آخر إشارة</h3>
                        <span id="signal-time">--:--:--</span>
                    </div>
                    <div class="signal-content" id="signal-content">
                        <div class="signal-empty">⏳ في انتظار إشارة...</div>
                    </div>
                    <div class="signal-actions">
                        <button id="clear-signals" class="btn-secondary">🗑️ مسح الإشارات</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>

            symbol: 'BTCUSDT',
            timeframe: '1m',
            scanInterval: 30000, // 30 seconds
            maxCandles: 500,
            apiBase: 'https://api.binance.com'
        };

        // ============================================================
        // DATA STORE
        // ============================================================
        const DataStore = {
            symbols: [],
            candles: {},
            signals: [],
            hpSignals: [],
            analysis: {
                trend: 'neutral',
                adx: 0,
                atr: 0,
                poc: 0,
                vah: 0,
                val: 0,
                cvd: 0,
                confidence: 0,
                orderBlocks: { bullish: [], bearish: [] },
                liquiditySweeps: { sweeps: [] },
                fvg: { bullish: [], bearish: [] },

            },
            isScanning: false,
            lastScan: 0
        };

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        const Utils = {
            round(val, decimals = 2) { return Number(val.toFixed(decimals)); },
            timestamp() { return new Date().toLocaleTimeString('ar-EG'); },
            formatPrice(p) {
                if (!p) return '--';
                return p >= 100 ? p.toFixed(2) : p >= 1 ? p.toFixed(4) : p.toFixed(6);
            },
            formatPercent(p) { return (p * 100).toFixed(1) + '%'; },
            sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
            calculateConfidence(conditions) {
                const total = Object.keys(conditions).length;
                const met = Object.values(conditions).filter(v => v === true).length;
                return Math.round((met / total) * 100);
            },
            isBullishCandle(c) { return c.close > c.open; },
            isBearishCandle(c) { return c.close < c.open; },
            highest(arr, key) { return Math.max(...arr.map(c => c[key])); },
            lowest(arr, key) { return Math.min(...arr.map(c => c[key])); },
            sma(arr, period) {
                if (arr.length < period) return arr.reduce((a, b) => a + b, 0) / arr.length;
                return arr.slice(-period).reduce((a, b) => a + b, 0) / period;
            }
        };

        // ============================================================
        // BINANCE API - DATA FETCHER
        // ============================================================
        class BinanceAPI {
            static async getSymbols() {
                try {
                    const resp = await fetch(`${CONFIG.apiBase}/api/v3/exchangeInfo`);
                    const data = await resp.json();
                    return data.symbols
                        .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
                        .map(s => s.symbol)
                        .slice(0, 30);

                }
            }

            static async getCandles(symbol, timeframe, limit = CONFIG.maxCandles) {
                const intervals = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1h', '4h': '4h', '1d': '1d' };
                const interval = intervals[timeframe] || '1m';
                try {
                    const url = `${CONFIG.apiBase}/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
                    const resp = await fetch(url);

                    return data.map(k => ({

            static async getCurrentPrice(symbol) {

                }
            }

        // ============================================================
        // SMC INDICATORS (REAL DATA ONLY)
        // ============================================================
        class SMCIndicators {
            // --- ADX ---
            static calculateADX(candles, period = 14) {
                if (candles.length < period + 1) return { adx: 0, plusDI: 0, minusDI: 0 };
                const high = candles.map(c => c.high);
                const low = candles.map(c => c.low);
                const close = candles.map(c => c.close);
                let tr = [], plusDM = [], minusDM = [];
                for (let i = 1; i < candles.length; i++) {
                    const hl = high[i] - low[i];
                    const hc = Math.abs(high[i] - close[i - 1]);
                    const lc = Math.abs(low[i] - close[i - 1]);
                    tr.push(Math.max(hl, hc, lc));
                    const up = high[i] - high[i - 1];
                    const down = low[i - 1] - low[i];
                    plusDM.push(up > down && up > 0 ? up : 0);
                    minusDM.push(down > up && down > 0 ? down : 0);
                }
                const smooth = (arr, p) => {
                    let result = [];
                    let sum = arr.slice(0, p).reduce((a, b) => a + b, 0);
                    result.push(sum / p);
                    for (let i = p; i < arr.length; i++) {
                        sum = (sum * (p - 1) + arr[i]) / p;
                        result.push(sum);
                    }
                    return result;
                };
                const smoothTR = smooth(tr, period);
                const smoothPlusDM = smooth(plusDM, period);
                const smoothMinusDM = smooth(minusDM, period);
                const plusDI = smoothPlusDM.map((v, i) => (v / smoothTR[i]) * 100);
                const minusDI = smoothMinusDM.map((v, i) => (v / smoothTR[i]) * 100);
                const dx = plusDI.map((p, i) => {
                    const m = minusDI[i];
                    return (Math.abs(p - m) / (p + m)) * 100;
                });
                const adx = smooth(dx, period);
                return {
                    adx: adx.length > 0 ? adx[adx.length - 1] : 0,
                    plusDI: plusDI.length > 0 ? plusDI[plusDI.length - 1] : 0,
                    minusDI: minusDI.length > 0 ? minusDI[minusDI.length - 1] : 0
                };
            }

            // --- ATR ---
            static calculateATR(candles, period = 14) {
                if (candles.length < period + 1) return 0;
                let tr = [];
                for (let i = 1; i < candles.length; i++) {
                    const hl = candles[i].high - candles[i].low;
                    const hc = Math.abs(candles[i].high - candles[i - 1].close);
                    const lc = Math.abs(candles[i].low - candles[i - 1].close);
                    tr.push(Math.max(hl, hc, lc));
                }
                let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
                for (let i = period; i < tr.length; i++) {
                    atr = (atr * (period - 1) + tr[i]) / period;
                }
                return atr;
            }

            // --- Order Blocks (SMC) ---
            static findOrderBlocks(candles, lookback = 100) {
                if (candles.length < 20) return { bullish: [], bearish: [] };
                const blocks = { bullish: [], bearish: [] };
                const start = Math.max(0, candles.length - lookback);
                for (let i = start + 5; i < candles.length - 3; i++) {
                    const c = candles[i];
                    if (c.close > c.open) {
                        // Bullish OB: strong green candle, then price retests
                        const isStrong = (c.close - c.open) > (c.high - c.low) * 0.6;
                        if (isStrong && c.low < c.open) {
                            // Check if price later retested this level
                            for (let j = i + 2; j < Math.min(i + 15, candles.length); j++) {
                                if (candles[j].low <= c.low * 1.002 && candles[j].close > candles[j].open) {
                                    blocks.bullish.push({ index: i, price: c.low, high: c.high });
                                    break;
                                }
                            }
                        }
                    } else {
                        // Bearish OB: strong red candle
                        const isStrong = (c.open - c.close) > (c.high - c.low) * 0.6;
                        if (isStrong && c.high > c.open) {
                            for (let j = i + 2; j < Math.min(i + 15, candles.length); j++) {
                                if (candles[j].high >= c.high * 0.998 && candles[j].close < candles[j].open) {
                                    blocks.bearish.push({ index: i, price: c.high, low: c.low });
                                    break;
                                }
                            }
                        }
                    }
                }
                return blocks;
            }

            // --- Liquidity Sweep ---
            static findLiquiditySweeps(candles, lookback = 50) {
                if (candles.length < 10) return { sweeps: [] };
                const sweeps = [];
                const start = Math.max(0, candles.length - lookback);
                for (let i = start + 4; i < candles.length - 3; i++) {
                    const c = candles[i];
                    const prev4 = candles.slice(i - 4, i);
                    const prevLow = Math.min(...prev4.map(x => x.low));
                    const prevHigh = Math.max(...prev4.map(x => x.high));
                    // Bullish sweep: break below previous low, then close green
                    if (c.low < prevLow && c.close > c.open && c.close > prev4[prev4.length - 1].close) {
                        sweeps.push({ index: i, type: 'bullish', price: c.low });
                    }
                    // Bearish sweep: break above previous high, then close red
                    if (c.high > prevHigh && c.close < c.open && c.close < prev4[prev4.length - 1].close) {
                        sweeps.push({ index: i, type: 'bearish', price: c.high });
                    }
                }
                return { sweeps };
            }

            // --- Fair Value Gap (FVG) ---
            static findFVG(candles, lookback = 100) {
                if (candles.length < 5) return { bullish: [], bearish: [] };
                const fvg = { bullish: [], bearish: [] };
                const start = Math.max(0, candles.length - lookback);
                for (let i = start + 2; i < candles.length - 2; i++) {
                    const c1 = candles[i - 1];
                    const c2 = candles[i];
                    const c3 = candles[i + 1];
                    // Bullish FVG: gap between c1 high and c3 low
                    if (c1.high < c3.low && c2.close > c2.open) {
                        fvg.bullish.push({ index: i, top: c3.low, bottom: c1.high });
                    }
                    // Bearish FVG: gap between c1 low and c3 high
                    if (c1.low > c3.high && c2.close < c2.open) {
                        fvg.bearish.push({ index: i, top: c1.low, bottom: c3.high });
                    }
                }
                return fvg;
            }

            // --- Market Structure (BOS & CHoCH) ---
            static findMarketStructure(candles, lookback = 100) {
                if (candles.length < 30) return { bos: [], choch: [] };
                const structure = { bos: [], choch: [] };
                const start = Math.max(0, candles.length - lookback);
                let swingHighs = [], swingLows = [];
                for (let i = start + 5; i < candles.length - 5; i++) {
                    const c = candles[i];
                    const prev5 = candles.slice(i - 5, i);
                    const next5 = candles.slice(i + 1, i + 6);
                    if (c.high > Math.max(...prev5.map(x => x.high)) &&
                        c.high > Math.max(...next5.map(x => x.high))) {
                        swingHighs.push({ index: i, price: c.high });
                    }
                    if (c.low < Math.min(...prev5.map(x => x.low)) &&
                        c.low < Math.min(...next5.map(x => x.low))) {
                        swingLows.push({ index: i, price: c.low });
                    }
                }
                // CHoCH: Change of Character - break of last swing
                if (swingHighs.length > 2) {
                    const lastHigh = swingHighs[swingHighs.length - 1];
                    const prevHigh = swingHighs[swingHighs.length - 2];
                    if (lastHigh.price > prevHigh.price) {
                        structure.choch.push({ type: 'bullish', index: lastHigh.index, price: lastHigh.price });
                    }
                }
                if (swingLows.length > 2) {
                    const lastLow = swingLows[swingLows.length - 1];
                    const prevLow = swingLows[swingLows.length - 2];
                    if (lastLow.price < prevLow.price) {
                        structure.choch.push({ type: 'bearish', index: lastLow.index, price: lastLow.price });
                    }
                }
                // BOS: Break of Structure
                if (swingHighs.length > 1) {
                    const last = swingHighs[swingHighs.length - 1];
                    const prev = swingHighs[swingHighs.length - 2];
                    if (last.price > prev.price) {
                        structure.bos.push({ type: 'bullish', index: last.index, price: last.price });
                    }
                }
                if (swingLows.length > 1) {
                    const last = swingLows[swingLows.length - 1];
                    const prev = swingLows[swingLows.length - 2];
                    if (last.price < prev.price) {
                        structure.bos.push({ type: 'bearish', index: last.index, price: last.price });
                    }
                }
                return structure;
            }

            // --- Volume Profile (POC, VAH, VAL) ---
            static calculateVolumeProfile(candles, levels = 30) {
                if (candles.length < 10) return { poc: 0, vah: 0, val: 0 };
                const prices = candles.map(c => (c.high + c.low) / 2);
                const volumes = candles.map(c => c.volume || 1);
                const minP = Math.min(...prices);
                const maxP = Math.max(...prices);
                const step = (maxP - minP) / levels;
                if (step === 0) return { poc: prices[0], vah: prices[0], val: prices[0] };
                const buckets = Array(levels).fill(0);
                prices.forEach((p, i) => {
                    const idx = Math.min(Math.floor((p - minP) / step), levels - 1);
                    buckets[idx] += volumes[i];
                });
                const maxIdx = buckets.indexOf(Math.max(...buckets));
                const poc = minP + maxIdx * step + step / 2;
                let cumSum = 0;
                const totalVol = buckets.reduce((a, b) => a + b, 0);
                let vahIdx = maxIdx;
                for (let i = maxIdx; i < levels; i++) {
                    cumSum += buckets[i];
                    if (cumSum >= totalVol * 0.68) { vahIdx = i; break; }
                }
                let valIdx = maxIdx;
                cumSum = 0;
                for (let i = maxIdx; i >= 0; i--) {
                    cumSum += buckets[i];
                    if (cumSum >= totalVol * 0.68) { valIdx = i; break; }
                }
                return {
                    poc: Utils.round(poc, 2),
                    vah: Utils.round(minP + vahIdx * step + step / 2, 2),
                    val: Utils.round(minP + valIdx * step + step / 2, 2)
                };
            }

            // --- CVD (Cumulative Volume Delta) ---
            static calculateCVD(candles) {
                if (candles.length < 2) return 0;
                let cvd = 0;
                for (let i = 1; i < candles.length; i++) {
                    const c = candles[i];
                    const delta = c.close > c.open ? (c.volume || 1) : -(c.volume || 1);
                    cvd += delta;
                }
                return cvd;
            }

            // --- Trend Detection ---
            static detectTrend(candles, period = 20) {
                if (candles.length < period) return 'neutral';
                const close = candles.map(c => c.close);
                const sma = close.slice(-period).reduce((a, b) => a + b, 0) / period;
                const last = close[close.length - 1];
                if (last > sma * 1.02) return 'bullish';
                if (last < sma * 0.98) return 'bearish';
                return 'neutral';
            }

            // --- Complete SMC Analysis ---
            static fullAnalysis(candles) {
                if (candles.length < 30) {
                    return {
                        trend: 'neutral',
                        adx: 0,
                        atr: 0,
                        poc: 0,
                        vah: 0,
                        val: 0,
                        cvd: 0,
                        orderBlocks: { bullish: [], bearish: [] },
                        liquiditySweeps: { sweeps: [] },
                        fvg: { bullish: [], bearish: [] },
                        structure: { bos: [], choch: [] },
                        confidence: 0
                    };
                }
                const adxData = this.calculateADX(candles);
                const atr = this.calculateATR(candles);
                const vp = this.calculateVolumeProfile(candles);
                const cvd = this.calculateCVD(candles);
                const ob = this.findOrderBlocks(candles);
                const ls = this.findLiquiditySweeps(candles);
                const fvg = this.findFVG(candles);
                const structure = this.findMarketStructure(candles);
                const trend = this.detectTrend(candles);

                const conditions = {
                    adx: adxData.adx >= CONFIG.adxThreshold,
                    trend: trend !== 'neutral',
                    ob: ob.bullish.length > 0 || ob.bearish.length > 0,
                    ls: ls.sweeps.length > 0,
                    fvg: fvg.bullish.length > 0 || fvg.bearish.length > 0,
                    structure: structure.bos.length > 0 || structure.choch.length > 0,
                    vp: vp.poc > 0
                };
                const confidence = Utils.calculateConfidence(conditions);

                return {
                    trend,
                    adx: adxData.adx,
                    plusDI: adxData.plusDI,
                    minusDI: adxData.minusDI,
                    atr,
                    poc: vp.poc,
                    vah: vp.vah,
                    val: vp.val,
                    cvd,
                    orderBlocks: ob,
                    liquiditySweeps: ls,
                    fvg,
                    structure,
                    confidence,
                    conditions
                };
            }
        }

        // ============================================================
        // DECISION ENGINE
        // ============================================================
        class DecisionEngine {
            static evaluate(candles, analysis, symbol) {
                if (candles.length < 30 || analysis.adx < CONFIG.adxThreshold) {
                    return { signal: null, reasons: [], confidence: 0 };
                }

                const last = candles[candles.length - 1];
                const price = last.close;
                const adx = analysis.adx;
                const atr = analysis.atr;
                const poc = analysis.poc;
                const vah = analysis.vah;
                const val = analysis.val;
                const cvd = analysis.cvd;
                const ob = analysis.orderBlocks;
                const sweeps = analysis.liquiditySweeps.sweeps;
                const fvg = analysis.fvg;
                const structure = analysis.structure;

                // --- BUY CONDITIONS (ALL MUST BE TRUE) ---
                const buyConditions = {
                    adxOk: adx >= CONFIG.adxThreshold,
                    bullishOB: ob.bullish.some(b => price >= b.price * 0.998 && price <= b.high * 1.005),
                    sweep: sweeps.some(s => s.type === 'bullish' && Math.abs(price - s.price) < atr * 0.5),
                    fvg: fvg.bullish.some(f => price >= f.bottom && price <= f.top),
                    structure: structure.bos.some(b => b.type === 'bullish') || structure.choch.some(c => c.type === 'bullish'),
                    atPOC: Math.abs(price - poc) < atr * 0.4,
                    cvdBullish: cvd > 0,
                    trendBullish: analysis.trend === 'bullish'
                };

                // --- SELL CONDITIONS (ALL MUST BE TRUE) ---
                const sellConditions = {
                    adxOk: adx >= CONFIG.adxThreshold,
                    bearishOB: ob.bearish.some(b => price <= b.price * 1.002 && price >= b.low * 0.995),
                    sweep: sweeps.some(s => s.type === 'bearish' && Math.abs(price - s.price) < atr * 0.5),
                    fvg: fvg.bearish.some(f => price >= f.bottom && price <= f.top),
                    structure: structure.bos.some(b => b.type === 'bearish') || structure.choch.some(c => c.type === 'bearish'),
                    atPOC: Math.abs(price - poc) < atr * 0.4,
                    cvdBearish: cvd < 0,
                    trendBearish: analysis.trend === 'bearish'
                };

                const buyAll = Object.values(buyConditions).every(v => v === true);
                const sellAll = Object.values(sellConditions).every(v => v === true);

                let signal = null;
                let reasons = [];

                if (buyAll) {
                    const entry = price;
                    const sl = entry - atr * CONFIG.atrStopLossMultiplier;
                    const tp1 = entry + atr * 1.5;
                    const tp2 = entry + atr * 2.5;
                    const tp3 = entry + atr * 4.0;
                    const rr1 = (tp1 - entry) / (entry - sl);
                    const rr2 = (tp2 - entry) / (entry - sl);
                    const rr3 = (tp3 - entry) / (entry - sl);
                    signal = {
                        type: 'BUY',
                        symbol: symbol || CONFIG.symbol,
                        entry: Utils.round(entry, 2),
                        stopLoss: Utils.round(sl, 2),
                        takeProfit1: Utils.round(tp1, 2),
                        takeProfit2: Utils.round(tp2, 2),
                        takeProfit3: Utils.round(tp3, 2),
                        rr1: Utils.round(rr1, 2),
                        rr2: Utils.round(rr2, 2),
                        rr3: Utils.round(rr3, 2),
                        confidence: Utils.calculateConfidence(buyConditions),
                        atr: Utils.round(atr, 2),
                        adx: Utils.round(adx, 1),
                        timestamp: Date.now()
                    };
                    reasons = Object.keys(buyConditions).filter(k => buyConditions[k]);
                } else if (sellAll) {
                    const entry = price;
                    const sl = entry + atr * CONFIG.atrStopLossMultiplier;
                    const tp1 = entry - atr * 1.5;
                    const tp2 = entry - atr * 2.5;
                    const tp3 = entry - atr * 4.0;
                    const rr1 = (entry - tp1) / (sl - entry);
                    const rr2 = (entry - tp2) / (sl - entry);
                    const rr3 = (entry - tp3) / (sl - entry);
                    signal = {
                        type: 'SELL',
                        symbol: symbol || CONFIG.symbol,
                        entry: Utils.round(entry, 2),
                        stopLoss: Utils.round(sl, 2),
                        takeProfit1: Utils.round(tp1, 2),
                        takeProfit2: Utils.round(tp2, 2),
                        takeProfit3: Utils.round(tp3, 2),
                        rr1: Utils.round(rr1, 2),
                        rr2: Utils.round(rr2, 2),
                        rr3: Utils.round(rr3, 2),
                        confidence: Utils.calculateConfidence(sellConditions),
                        atr: Utils.round(atr, 2),
                        adx: Utils.round(adx, 1),
                        timestamp: Date.now()
                    };
                    reasons = Object.keys(sellConditions).filter(k => sellConditions[k]);
                }

                return { signal, reasons, confidence: signal ? signal.confidence : 0 };
            }
        }

        // ============================================================
        // NOTIFICATION MANAGER
        // ============================================================
        class NotificationManager {
            static async sendTelegram(message, token, chatId) {
                if (!token || !chatId) return false;
                try {
                    const url = `https://api.telegram.org/bot${token}/sendMessage`;
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML' })
                    });
                    return true;
                } catch (e) {
                    console.warn('Telegram failed:', e);
                    return false;
                }
            }

            static async sendDiscord(message, webhookUrl) {
                if (!webhookUrl) return false;
                try {
                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: message })
                    });
                    return true;
                } catch (e) {
                    console.warn('Discord failed:', e);
                    return false;
                }
            }

            static async notify(signal) {
                if (!signal) return;
                const msg = `🚨 <b>${signal.type} SIGNAL</b> 🚨\n` +
                    `💰 العملة: ${signal.symbol}\n` +
                    `📊 الدخول: ${signal.entry}\n` +
                    `🛑 وقف: ${signal.stopLoss}\n` +
                    `🎯 TP1: ${signal.takeProfit1} (RR: ${signal.rr1})\n` +
                    `🎯 TP2: ${signal.takeProfit2} (RR: ${signal.rr2})\n` +
                    `🎯 TP3: ${signal.takeProfit3} (RR: ${signal.rr3})\n` +
                    `📈 الثقة: ${signal.confidence}%\n` +
                    `⏰ ${new Date().toLocaleString()}`;

                if (CONFIG.telegramToken && CONFIG.telegramChat) {
                    await this.sendTelegram(msg, CONFIG.telegramToken, CONFIG.telegramChat);
                }
                if (CONFIG.discordWebhook) {
                    await this.sendDiscord(msg.replace(/<[^>]*>/g, ''), CONFIG.discordWebhook);
                }
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(`${signal.type} Signal - ${signal.symbol}`, {
                        body: `Entry: ${signal.entry}`,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📊</text></svg>'
                    });
                }
            }
        }

        // ============================================================
        // CHART MANAGER (TradingView Lightweight Charts)
        // ============================================================
        class ChartManager {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.chart = LightweightCharts.createChart(this.container, {
                    width: this.container.clientWidth,
                    height: this.container.clientHeight,
                    layout: {
                        background: { color: '#0d1117' },
                        textColor: '#c9d1d9',
                    },
                    grid: {
                        vertLines: { color: '#21262d' },
                        horzLines: { color: '#21262d' },
                    },
                    crosshair: {
                        mode: LightweightCharts.CrosshairMode.Normal,
                    },
                    rightPriceScale: {
                        borderColor: '#30363d',
                    },
                    timeScale: {
                        borderColor: '#30363d',
                        timeVisible: true,
                    },
                });
                this.candleSeries = this.chart.addCandlestickSeries({
                    upColor: '#2ea043',
                    downColor: '#f85149',
                    borderUpColor: '#2ea043',
                    borderDownColor: '#f85149',
                    wickUpColor: '#2ea043',
                    wickDownColor: '#f85149',
                });
                this.indicatorSeries = [];
                this.resizeObserver = new ResizeObserver(() => this.resize());
                this.resizeObserver.observe(this.container);
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.chart.resize(this.container.clientWidth, this.container.clientHeight);
            }

            setData(candles) {
                if (!candles || candles.length === 0) return;
                const data = candles.map(c => ({
                    time: Math.floor(c.timestamp / 1000),
                    open: c.open,
                    high: c.high,
                    low: c.low,
                    close: c.close
                }));
                this.candleSeries.setData(data);
            }

            clearIndicators() {
                this.indicatorSeries.forEach(s => this.chart.removeSeries(s));
                this.indicatorSeries = [];
            }

            addIndicator(data, color = '#58a6ff', type = 'line') {
                const series = this.chart.addLineSeries({
                    color: color,
                    lineWidth: 1,
                    crosshairMarkerVisible: true,
                });
                series.setData(data.map(d => ({
                    time: Math.floor(d.time / 1000) || d.time,
                    value: d.value
                })));
                this.indicatorSeries.push(series);
            }

            drawOrderBlocks(blocks, type = 'bullish') {
                const color = type === 'bullish' ? '#2ea043' : '#f85149';
                const fillColor = type === 'bullish' ? 'rgba(46, 160, 67, 0.15)' : 'rgba(248, 81, 73, 0.15)';
                blocks.forEach(b => {
                    const time = Math.floor(b.timestamp / 1000) || b.time;
                    // Draw rectangle using series markers
                    // Simplified: use price line
                    const series = this.chart.addLineSeries({
                        color: color,
                        lineWidth: 1,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                    });
                    series.setData([{ time: time, value: b.price }]);
                    this.indicatorSeries.push(series);
                });
            }
        }

        // ============================================================
        // UI MANAGER
        // ============================================================
        class UIManager {
            static init() {
                // Load symbols
                this.loadSymbols();
                
                // Timeframe buttons
                document.querySelectorAll('.tf-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        CONFIG.timeframe = btn.dataset.tf;
                        this.onTimeframeChange(CONFIG.timeframe);
                    });
                });

                // Settings
                document.getElementById('settings-btn').addEventListener('click', () => {
                    document.getElementById('settings-modal').classList.add('active');
                });
                document.querySelector('.close-modal').addEventListener('click', () => {
                    document.getElementById('settings-modal').classList.remove('active');
                });
                document.getElementById('save-settings').addEventListener('click', () => {
                    CONFIG.riskPercent = parseFloat(document.getElementById('risk-input').value) || 2;
                    CONFIG.atrStopLossMultiplier = parseFloat(document.getElementById('atr-sl-multiplier').value) || 1.5;
                    CONFIG.telegramToken = document.getElementById('telegram-token').value;
                    CONFIG.telegramChat = document.getElementById('telegram-chat').value;
                    CONFIG.discordWebhook = document.getElementById('discord-webhook').value;
                    document.getElementById('settings-modal').classList.remove('active');
                    localStorage.setItem('smc_config', JSON.stringify(CONFIG));
                });

                // Clear signals
                document.getElementById('clear-signals').addEventListener('click', () => {
                    DataStore.signals = [];
                    this.renderSignals();
                });

                // Symbol search
                document.getElementById('symbol-search').addEventListener('input', (e) => {
                    const q = e.target.value.toLowerCase();
                    document.querySelectorAll('.symbol-item').forEach(el => {
                        el.style.display = el.dataset.symbol.toLowerCase().includes(q) ? 'flex' : 'none';
                    });
                });

                // Load saved config
                const saved = localStorage.getItem('smc_config');
                if (saved) {
                    try {
                        const cfg = JSON.parse(saved);
                        Object.assign(CONFIG, cfg);
                        document.getElementById('risk-input').value = CONFIG.riskPercent;
                        document.getElementById('atr-sl-multiplier').value = CONFIG.atrStopLossMultiplier;
                        document.getElementById('telegram-token').value = CONFIG.telegramToken || '';
                        document.getElementById('telegram-chat').value = CONFIG.telegramChat || '';
                        document.getElementById('discord-webhook').value = CONFIG.discordWebhook || '';
                    } catch (e) {}
                }

                // Request notification permission
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }

                // Start with initial symbol
                this.onSymbolChange(CONFIG.symbol);

                // Start scanning
                this.startScanning();
            }

            static async loadSymbols() {
                const symbols = await BinanceAPI.getSymbols();
                DataStore.symbols = symbols;
                const listEl = document.getElementById('symbol-list');
                listEl.innerHTML = '';
                symbols.forEach(sym => {
                    const div = document.createElement('div');
                    div.className = 'symbol-item' + (sym === CONFIG.symbol ? ' active' : '');
                    div.innerHTML = `<span class="sym">${sym}</span><span class="price">--</span>`;
                    div.dataset.symbol = sym;
                    div.addEventListener('click', () => {
                        document.querySelectorAll('.symbol-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                        CONFIG.symbol = sym;
                        this.onSymbolChange(sym);
                    });
                    listEl.appendChild(div);
                });
            }

            static async onSymbolChange(symbol) {
                CONFIG.symbol = symbol;
                document.getElementById('status-text').textContent = 'جاري التحميل...';
                document.getElementById('signal-badge').className = 'signal-badge wait';
                document.getElementById('signal-badge').textContent = '⏳ تحميل...';
                
                const candles = await BinanceAPI.getCandles(symbol, CONFIG.timeframe);
                if (candles.length > 0) {
                    DataStore.candles[symbol] = candles;
                    this.updateChart(symbol);
                    this.updateAnalysis(symbol);
                    document.getElementById('status-text').textContent = 'متصل';
                } else {
                    document.getElementById('status-text').textContent = 'فشل التحميل';
                }
            }

            static async onTimeframeChange(tf) {
                CONFIG.timeframe = tf;
                await this.onSymbolChange(CONFIG.symbol);
            }

            static updateChart(symbol) {
                const candles = DataStore.candles[symbol];
                if (!candles || candles.length === 0) return;
                
                if (!window.chartManager) {
                    window.chartManager = new ChartManager('chart');
                }
                window.chartManager.setData(candles);
                
                // Draw indicators based on toggles
                const showOB = document.getElementById('show-ob').checked;
                const showLQ = document.getElementById('show-lq').checked;
                const showFVG = document.getElementById('show-fvg').checked;
                const showVP = document.getElementById('show-vp').checked;
                const showStruct = document.getElementById('show-struct').checked;
                
                window.chartManager.clearIndicators();
                
                const analysis = SMCIndicators.fullAnalysis(candles);
                DataStore.analysis = analysis;
                
                if (showOB) {
                    analysis.orderBlocks.bullish.forEach(b => {
                        window.chartManager.addIndicator([{ time: b.index, value: b.price }], '#2ea043');
                    });
                    analysis.orderBlocks.bearish.forEach(b => {
                        window.chartManager.addIndicator([{ time: b.index, value: b.price }], '#f85149');
                    });
                }
                if (showVP && analysis.poc > 0) {
                    window.chartManager.addIndicator([{ time: candles[candles.length - 1].timestamp, value: analysis.poc }], '#f0883e');
                }
            }

            static updateAnalysis(symbol) {
                const candles = DataStore.candles[symbol];
                if (!candles || candles.length === 0) return;
                
                const analysis = SMCIndicators.fullAnalysis(candles);
                DataStore.analysis = analysis;
                
                // Update panel
                const trendEl = document.getElementById('trend');
                trendEl.textContent = analysis.trend === 'bullish' ? '📈 صاعد' :
                    analysis.trend === 'bearish' ? '📉 هابط' : '➖ محايد';
                trendEl.className = 'value ' + analysis.trend;
                
                document.getElementById('adx-value').textContent = analysis.adx.toFixed(1);
                document.getElementById('adx-value').style.color = analysis.adx >= CONFIG.adxThreshold ? '#2ea043' : '#8b949e';
                document.getElementById('atr-value').textContent = Utils.formatPrice(analysis.atr);
                document.getElementById('poc-value').textContent = Utils.formatPrice(analysis.poc);
                document.getElementById('vah-value').textContent = Utils.formatPrice(analysis.vah);
                document.getElementById('val-value').textContent = Utils.formatPrice(analysis.val);
                document.getElementById('cvd-value').textContent = analysis.cvd.toFixed(0);
                document.getElementById('cvd-value').style.color = analysis.cvd > 0 ? '#2ea043' : '#f85149';
                document.getElementById('confidence').textContent = analysis.confidence + '%';
                
                // Update price
                const last = candles[candles.length - 1];
                document.getElementById('signal-price').textContent = '$' + Utils.formatPrice(last.close);
                
                // Run decision engine
                const decision = DecisionEngine.evaluate(candles, analysis, symbol);
                if (decision.signal) {
                    // Check for duplicate
                    const lastSignal = DataStore.signals[DataStore.signals.length - 1];
                    if (lastSignal && lastSignal.type === decision.signal.type &&
                        Math.abs(lastSignal.entry - decision.signal.entry) < decision.signal.atr * 0.3) {
                        return;
                    }
                    DataStore.signals.push(decision.signal);
                    if (DataStore.signals.length > CONFIG.maxSignals) {
                        DataStore.signals.splice(0, DataStore.signals.length - CONFIG.maxSignals);
                    }
                    this.renderSignals();
                    this.showSignal(decision.signal, decision.reasons);
                    NotificationManager.notify(decision.signal);
                }
            }

            static renderSignals() {
                const container = document.getElementById('signal-content');
                if (DataStore.signals.length === 0) {
                    container.innerHTML = '<div class="signal-empty">⏳ في انتظار إشارة...</div>';
                    return;
                }
                let html = '';
                for (let i = DataStore.signals.length - 1; i >= 0; i--) {
                    const s = DataStore.signals[i];
                    const cls = s.type === 'BUY' ? 'buy' : 'sell';
                    html += `<div class="signal-item ${cls}">
                        <div class="signal-top">
                            <span class="signal-type ${cls}">${s.type} ${s.symbol}</span>
                            <span class="signal-conf">ثقة: ${s.confidence}%</span>
                        </div>
                        <div class="signal-details">
                            <span>دخول: ${s.entry}</span>
                            <span>SL: ${s.stopLoss}</span>
                            <span>TP1: ${s.takeProfit1} (${s.rr1})</span>
                            <span>TP2: ${s.takeProfit2} (${s.rr2})</span>
                            <span>TP3: ${s.takeProfit3} (${s.rr3})</span>
                            <span>⏰ ${new Date(s.timestamp).toLocaleTimeString()}</span>
                        </div>
                    </div>`;
                }
                container.innerHTML = html;
            }

            static showSignal(signal, reasons) {
                const badge = document.getElementById('signal-badge');
                const cls = signal.type === 'BUY' ? 'buy' : 'sell';
                badge.className = 'signal-badge ' + cls;
                badge.textContent = signal.type === 'BUY' ? '📈 شراء' : '📉 بيع';
                document.getElementById('signal-time').textContent = Utils.timestamp();
                
                console.log(`✅ إشارة ${signal.type} على ${signal.symbol}`, signal);
                console.log('📋 الأسباب:', reasons);
            }

            static updateHPSignals(signals) {
                const container = document.getElementById('hp-content');
                const countEl = document.getElementById('hp-count');
                
                if (!signals || signals.length === 0) {
                    container.innerHTML = '<div class="hp-empty">⏳ No High Probability Signal</div>';
                    countEl.textContent = '0';
                    return;
                }
                
                countEl.textContent = signals.length;
                let html = '';
                signals.slice(0, CONFIG.maxHPSignals).forEach(s => {
                    const cls = s.type === 'BUY' ? 'buy' : 'sell';
                    html += `<div class="hp-item ${cls}" onclick="UIManager.onSymbolChange('${s.symbol}')">
                        <span class="hp-symbol">${s.symbol}</span>
                        <span class="hp-type ${cls}">${s.type}</span>
                        <span class="hp-conf">${s.confidence}%</span>
                        <span style="font-size:9px;color:#8b949e;">${Utils.formatPrice(s.entry)}</span>
                    </div>`;
                });
                container.innerHTML = html;
            }

            static startScanning() {
                // Scan all symbols every 30 seconds
                setInterval(async () => {
                    if (DataStore.isScanning) return;
                    DataStore.isScanning = true;
                    try {
                        const hpSignals = [];
                        for (const sym of DataStore.symbols) {
                            const candles = await BinanceAPI.getCandles(sym, CONFIG.timeframe, 200);
                            if (candles.length < 30) continue;
                            DataStore.candles[sym] = candles;
                            const analysis = SMCIndicators.fullAnalysis(candles);
                            const decision = DecisionEngine.evaluate(candles, analysis, sym);
                            if (decision.signal) {
                                hpSignals.push(decision.signal);
                            }
                            // Small delay to avoid rate limiting
                            await Utils.sleep(100);
                        }
                        DataStore.hpSignals = hpSignals;
                        UIManager.updateHPSignals(hpSignals);
                        
                        // Update current symbol analysis
                        if (CONFIG.symbol) {
                            UIManager.updateAnalysis(CONFIG.symbol);
                        }
                    } catch (e) {
                        console.warn('Scan error:', e);
                    }
                    DataStore.isScanning = false;
                    DataStore.lastScan = Date.now();
                }, CONFIG.scanInterval);
            }
        }

        // ============================================================
        // SERVICE WORKER (PWA) - Inline
        // ============================================================
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => { e.waitUntil(self.skipWaiting()); });
                self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline', {status:503})));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            UIManager.init();
            console.log('📊 Crypto SMC AI Pro v3.0 - Signal Engine Only');
            console.log('🔍 Scanning for high probability signals...');
        });

        // ============================================================
        // GLOBAL EXPOSURE
        // ============================================================
        window.UIManager = UIManager;
        window.CONFIG = CONFIG;
        window.DataStore = DataStore;
        window.SMCIndicators = SMCIndicators;
        window.DecisionEngine = DecisionEngine;
        window.BinanceAPI = BinanceAPI;
    </script>
</body>
